<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Login and Signup</title>\n    <style>\n        .popup { display: none; position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); padding: 20px; background-color: white; border: 1px solid #ccc; z-index: 1000; }\n        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 999; }\n    </style>\n</head>\n<body>\n    <div class="overlay" id="overlay"></div>\n    <div class="popup" id="successPopup">\n        <p id="popupMessage">Success!</p>\n        <button onclick="closePopup()">Close</button>\n    </div>\n    <h2>Login Form</h2>\n    <form id="loginForm" onsubmit="return showPopup('Login Successful')">\n        <label for="loginEmail">Email:</label>\n        <input type="email" id="loginEmail" required>\n        <br>\n        <label for="loginPassword">Password:</label>\n        <input type="password" id="loginPassword" required>\n        <br>\n        <button type="submit">Login</button>\n    </form>\n    <h2>Signup Form</h2>\n    <form id="signupForm" onsubmit="return showPopup('Signup Successful')">\n        <label for="signupEmail">Email:</label>\n        <input type="email" id="signupEmail" required>\n        <br>\n        <label for="signupPassword">Password:</label>\n        <input type="password" id="signupPassword" required>\n        <br>\n        <button type="submit">Signup</button>\n    </form>\n    <script>\n        function showPopup(message) {\n            document.getElementById('popupMessage').innerText = message;\n            document.getElementById('overlay').style.display = 'block';\n            document.getElementById('successPopup').style.display = 'block';\n            return false;\n        }\n        function closePopup() {\n            document.getElementById('overlay').style.display = 'none';\n            document.getElementById('successPopup').style.display = 'none';\n        }\n    <\/script>\n</body>\n</html>
